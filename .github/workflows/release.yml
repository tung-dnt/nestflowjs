name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'patch'
      prerelease:
        description: 'Is this a prerelease?'
        required: false
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip bot commits to avoid infinite loop
    if: "!contains(github.event.head_commit.message, 'chore: bump version')"
    permissions:
      contents: write
      id-token: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 🍞 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🧪 Run tests
        run: bun test
        continue-on-error: true

      - name: 🔍 Type check
        run: bun run typecheck

      - name: 🏗️ Build package
        run: bun run build

      - name: ✅ Verify build output
        run: |
          echo "📂 Checking dist directory..."
          ls -la dist/
          echo "📋 Checking package files..."
          ls -la dist/workflow/ || echo "⚠️ workflow directory not found"
          ls -la dist/event-bus/ || echo "⚠️ event-bus directory not found"
          ls -la dist/adapter/ || echo "⚠️ adapter directory not found"
          ls -la dist/exception/ || echo "⚠️ exception directory not found"

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: 🔖 Bump version and generate CHANGELOG
        id: version
        run: |
          # Use explicit version type for manual dispatch, auto-detect from commits for push trigger
          VERSION_TYPE="${{ inputs.version_type }}"

          if [ -n "$VERSION_TYPE" ]; then
            echo "📌 Manual dispatch: bumping $VERSION_TYPE"
            npx changelogen@latest --bump --"$VERSION_TYPE" --no-tag --no-commit
          else
            echo "🤖 Auto-detecting version bump from conventional commits..."
            npx changelogen@latest --bump --no-tag --no-commit
          fi

          # Read the new version from package.json
          NEW_VERSION="v$(jq -r '.version' package.json)"
          echo "🏷️ New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "version_number=${NEW_VERSION#v}" >> $GITHUB_OUTPUT

          # Capture changelog content for GitHub Release body
          CHANGELOG_CONTENT=$(npx changelogen@latest --no-bump)
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG_CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 💾 Commit version bump
        run: |
          git add package.json CHANGELOG.md
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }}"
          git tag ${{ steps.version.outputs.new_version }}

      - name: 🚀 Push changes
        run: |
          git push origin main
          git push origin ${{ steps.version.outputs.new_version }}

      - name: 📤 Publish to NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: 🎉 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.new_version }}
          name: Release ${{ steps.version.outputs.new_version }}
          body: |
            ${{ steps.version.outputs.content }}

            ### Installation

            ```bash
            npm install nestflow-js@${{ steps.version.outputs.version_number }}
            ```

            **[Full Documentation](https://nestflow.organit.dev)** | **[NPM](https://www.npmjs.com/package/nestflow-js)**
          draft: false
          prerelease: ${{ inputs.prerelease || false }}

      - name: 📣 Announce Success
        run: |
          echo "🎉 Successfully released nestflow-js@${{ steps.version.outputs.version_number }}"
          echo "📦 NPM: https://www.npmjs.com/package/nestflow-js"
          echo "📚 Documentation: https://nestflow.organit.dev"
          echo "🏷️ Tag: ${{ steps.version.outputs.new_version }}"

  deploy-docs:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🍞 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📄 Setup Pages
        uses: actions/configure-pages@v5

      - name: 📦 Install dependencies
        working-directory: ./docs
        run: bun install

      - name: 🏗️ Build with Fumadocs
        working-directory: ./docs
        run: bun run build

      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/out

      - name: 🌐 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 📣 Announce Documentation Deployment
        run: |
          echo "📚 Documentation deployed successfully!"
          echo "🌐 URL: https://nestflow.organit.dev"
